# Eveus Dashboard v1.1 (UA)
# Готовий до вставки Lovelace-вигляд «Розділи» з усіма сутностями Eveus.
# Вставте під `views:` у режимі редагування YAML (див. README → Dashboard).
# English variant: docs/dashboard.yaml
title: Eveus
path: eveus
icon: mdi:ev-station
type: sections
max_columns: 3
dense_section_placement: true
sections:
  - type: grid
    cards:
      - type: heading
        heading: Стан
        icon: mdi:ev-station
      - type: tile
        entity: sensor.eveus_ev_charger_state
        name: Стан
        icon: mdi:ev-station
        color: primary
      - type: tile
        entity: sensor.eveus_ev_charger_power
        name: Потужність
        icon: mdi:flash
        color: amber
      - type: tile
        entity: sensor.eveus_ev_charger_current
        name: Струм
        icon: mdi:current-ac
      - type: tile
        entity: sensor.eveus_ev_charger_voltage
        name: Напруга
        icon: mdi:sine-wave
      - type: entities
        show_header_toggle: false
        state_color: true
        entities:
          - entity: sensor.eveus_ev_charger_substate
            name: Детальний стан
            icon: mdi:information-outline
          - entity: binary_sensor.eveus_ev_charger_car_connected
            name: Автомобіль підключено
            icon: mdi:car-electric
          - entity: binary_sensor.eveus_ev_charger_session_active
            name: Сесія активна
            icon: mdi:play-circle-outline
          - entity: sensor.eveus_ev_charger_current_set
            name: Встановлений струм
            icon: mdi:current-ac
      - type: grid
        columns: 2
        square: false
        cards:
          - type: custom:mini-graph-card
            name: Потужність
            icon: mdi:flash
            hours_to_show: 12
            points_per_hour: 6
            line_width: 2
            smoothing: true
            height: 90
            entities:
              - entity: sensor.eveus_ev_charger_power
            show:
              fill: fade
              labels: true
              name: false
          - type: custom:mini-graph-card
            name: Струм
            icon: mdi:current-ac
            hours_to_show: 12
            points_per_hour: 6
            line_width: 2
            height: 90
            entities:
              - entity: sensor.eveus_ev_charger_current
            show:
              fill: fade
              labels: true
              name: false
  - type: grid
    cards:
      - type: heading
        heading: Адаптивний режим, OCPP і годинник
        icon: mdi:shield-flash-outline
        heading_style: title
      - type: entities
        show_header_toggle: false
        state_color: true
        entities:
          - entity: switch.eveus_ev_charger_adaptive_mode
            name: Адаптивний режим
            icon: mdi:shield-flash-outline
          - entity: sensor.eveus_ev_charger_adaptive_charging
            name: Статус
            icon: mdi:circle-slice-8
          - entity: sensor.eveus_ev_charger_adaptive_current_limit
            name: Ліміт струму
            icon: mdi:current-ac
          - entity: sensor.eveus_ev_charger_adaptive_voltage_threshold
            name: Поріг напруги
            icon: mdi:sine-wave
          - type: divider
          - entity: switch.eveus_ev_charger_connect_to_ocpp
            name: Підключення до OCPP
            icon: mdi:cloud-sync-outline
          - entity: binary_sensor.eveus_ev_charger_ocpp_connected
            name: OCPP підключено
            icon: mdi:cloud-check-outline
      - type: entities
        title: Годинник
        show_header_toggle: false
        entities:
          - entity: select.eveus_ev_charger_time_zone
            name: Часовий пояс
            icon: mdi:earth
          - entity: sensor.eveus_ev_charger_system_time
            name: Годинник станції
            icon: mdi:clock-outline
          - entity: button.eveus_ev_charger_sync_time
            name: Синхронізувати з HA
            icon: mdi:clock-check-outline
  - type: grid
    cards:
      - type: heading
        heading: Батарея авто
        icon: mdi:car-battery
      - type: entities
        show_header_toggle: false
        entities:
          - entity: number.eveus_ev_charger_battery_capacity
            name: Ємність акумулятора
            icon: mdi:car-battery
          - entity: number.eveus_ev_charger_initial_soc
            name: Початковий SOC
            icon: mdi:battery-50
          - entity: number.eveus_ev_charger_target_soc
            name: Цільовий SOC
            icon: mdi:battery-high
          - entity: number.eveus_ev_charger_soc_correction
            name: Втрати заряджання
            icon: mdi:battery-minus-variant
          - type: divider
          - entity: sensor.eveus_ev_charger_soc_percent
            name: Поточний заряд
            icon: mdi:battery
          - entity: sensor.eveus_ev_charger_soc_energy
            name: Енергія батареї
            icon: mdi:battery-charging
          - entity: sensor.eveus_ev_charger_time_to_target_soc
            name: Час до цілі
            icon: mdi:clock-fast
          - entity: sensor.eveus_ev_charger_charging_finish_time
            name: Час завершення
            icon: mdi:clock-end
          - entity: sensor.eveus_ev_charger_energy_to_target_soc
            name: Енергія до цілі
            icon: mdi:lightning-bolt-outline
          - entity: sensor.eveus_ev_charger_cost_to_target_soc
            name: Вартість до цілі
            icon: mdi:cash-clock
  - type: grid
    cards:
      - type: heading
        heading: Сесія та тарифи
        icon: mdi:cash-multiple
      - type: entities
        show_header_toggle: false
        entities:
          - entity: sensor.eveus_ev_charger_session_time
            name: Тривалість
            icon: mdi:timer-sand
          - entity: sensor.eveus_ev_charger_session_energy
            name: Енергія
            icon: mdi:battery-charging
          - entity: sensor.eveus_ev_charger_session_cost
            name: Вартість
            icon: mdi:cash
          - type: divider
          - entity: sensor.eveus_ev_charger_active_rate_cost
            name: Активний тариф
            icon: mdi:cash-multiple
          - entity: sensor.eveus_ev_charger_primary_rate_cost
            name: Основний тариф
          - entity: sensor.eveus_ev_charger_rate_2_status
            name: Тариф 2
          - entity: sensor.eveus_ev_charger_rate_2_cost
            name: Вартість тарифу 2
          - entity: sensor.eveus_ev_charger_rate_3_status
            name: Тариф 3
          - entity: sensor.eveus_ev_charger_rate_3_cost
            name: Вартість тарифу 3
  - type: grid
    cards:
      - type: heading
        heading: Заряджання
        icon: mdi:tune
      - type: tile
        entity: number.eveus_ev_charger_charging_current
        name: Струм заряджання
        icon: mdi:current-ac
        features:
          - type: numeric-input
            style: slider
      - type: entities
        show_header_toggle: false
        state_color: true
        entities:
          - entity: switch.eveus_ev_charger_stop_charging
            name: Зупинити заряджання
            icon: mdi:stop-circle-outline
          - entity: switch.eveus_ev_charger_one_charge
            name: Одноразове заряджання
            icon: mdi:lightning-bolt
          - entity: switch.eveus_ev_charger_ground_protection
            name: Захист заземлення
            icon: mdi:shield-check
          - entity: button.eveus_ev_charger_force_refresh
            name: Примусове оновлення
            icon: mdi:refresh
  - type: grid
    cards:
      - type: heading
        heading: Лічильники
        icon: mdi:counter
      - type: entities
        show_header_toggle: false
        entities:
          - entity: sensor.eveus_ev_charger_total_energy
            name: Загальна енергія
            icon: mdi:counter
          - type: divider
          - entity: sensor.eveus_ev_charger_counter_a_energy
            name: Лічильник A
            icon: mdi:numeric-1-box-outline
          - entity: sensor.eveus_ev_charger_counter_a_cost
            name: Вартість лічильника A
            icon: mdi:cash
          - entity: button.eveus_ev_charger_reset_counter_a
            name: Скинути лічильник A
            icon: mdi:restart
          - type: divider
          - entity: sensor.eveus_ev_charger_counter_b_energy
            name: Лічильник B
            icon: mdi:numeric-2-box-outline
          - entity: sensor.eveus_ev_charger_counter_b_cost
            name: Вартість лічильника B
            icon: mdi:cash
          - entity: button.eveus_ev_charger_reset_counter_b
            name: Скинути лічильник B
            icon: mdi:restart
  - type: grid
    cards:
      - type: heading
        heading: Розклади
        heading_style: title
        icon: mdi:clipboard-clock-outline
      - square: false
        type: grid
        columns: 1
        cards:
          - type: entities
            show_header_toggle: false
            state_color: true
            entities:
              - entity: switch.eveus_ev_charger_schedule_1_enabled
                name: Увімкнено
                icon: mdi:power
              - entity: time.eveus_ev_charger_schedule_1_start
                name: Початок
                icon: mdi:clock-start
              - entity: time.eveus_ev_charger_schedule_1_stop
                name: Завершення
                icon: mdi:clock-end
              - entity: sensor.eveus_ev_charger_schedule_1
                name: Вікно
                icon: mdi:timetable
            title: Розклад 1
          - type: entities
            title: Розклад 2
            show_header_toggle: false
            state_color: true
            entities:
              - entity: switch.eveus_ev_charger_schedule_2_enabled
                name: Увімкнено
                icon: mdi:power
              - entity: time.eveus_ev_charger_schedule_2_start
                name: Початок
                icon: mdi:clock-start
              - entity: time.eveus_ev_charger_schedule_2_stop
                name: Завершення
                icon: mdi:clock-end
              - entity: sensor.eveus_ev_charger_schedule_2
                name: Вікно
                icon: mdi:timetable
  - type: grid
    cards:
      - type: heading
        heading: Діагностика
        icon: mdi:stethoscope
      - type: entities
        show_header_toggle: false
        entities:
          - entity: sensor.eveus_ev_charger_connection_quality
            name: Якість з'єднання
            icon: mdi:wifi
          - entity: sensor.eveus_ev_charger_wifi_signal
            name: Сигнал WiFi
            icon: mdi:wifi-strength-2
          - type: divider
          - entity: sensor.eveus_ev_charger_box_temperature
            name: Температура корпусу
            icon: mdi:thermometer
          - entity: sensor.eveus_ev_charger_plug_temperature
            name: Температура конектора
            icon: mdi:thermometer-lines
          - type: divider
          - entity: sensor.eveus_ev_charger_ground
            name: Заземлення
            icon: mdi:earth
          - entity: sensor.eveus_ev_charger_leakage_current
            name: Струм витоку
            icon: mdi:flash-alert
          - entity: sensor.eveus_ev_charger_leakage_current_peak
            name: Піковий струм витоку
            icon: mdi:flash-alert-outline
          - entity: sensor.eveus_ev_charger_battery_voltage
            name: Внутрішня батарея
            icon: mdi:car-battery
cards: []
