[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["."]
asyncio_mode = "auto"
asyncio_default_fixture_loop_scope = "function"
addopts = "-p no:homeassistant"

[tool.coverage.run]
branch = true
source = ["custom_components/eveus"]
omit = ["tests/*"]

[tool.coverage.report]
show_missing = true
skip_covered = true
fail_under = 90

[tool.mutmut]
source_paths = [
    "custom_components/eveus/utils.py",
    "custom_components/eveus/_payload.py",
    "custom_components/eveus/common_network.py",
    "custom_components/eveus/soc_limit.py",
]
tests_dir = "tests"
runner = "python -m pytest -q tests/test_property_invariants.py tests/test_firmware_parsing.py tests/test_common_network.py tests/test_soc_limit.py"

[tool.ruff]
line-length = 100
target-version = "py312"

[tool.ruff.lint]
select = ["E9", "F401", "F63", "F7", "F82"]
