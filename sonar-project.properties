sonar.organization=abovsh
sonar.projectKey=ABovsh_eveus
sonar.host.url=https://sonarcloud.io

# Free plan analyzes only the main branch. Pin every scan to main so a
# release-branch run refreshes the main project entry instead of attempting
# (paid) branch analysis.
sonar.branch.name=main

sonar.sources=custom_components/eveus
sonar.tests=tests
sonar.python.version=3.12
sonar.python.coverage.reportPaths=coverage.xml

# Rules that are false positives in pytest code:
#   S1244 — float equality assertions
#   S6466 — list/index access in assertions
#   S7503 — async test functions / fixtures with no await
sonar.issue.ignore.multicriteria=e1,e2,e3
sonar.issue.ignore.multicriteria.e1.ruleKey=python:S1244
sonar.issue.ignore.multicriteria.e1.resourceKey=tests/**
sonar.issue.ignore.multicriteria.e2.ruleKey=python:S6466
sonar.issue.ignore.multicriteria.e2.resourceKey=tests/**
sonar.issue.ignore.multicriteria.e3.ruleKey=python:S7503
sonar.issue.ignore.multicriteria.e3.resourceKey=tests/**
