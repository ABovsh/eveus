sonar.organization=abovsh
sonar.projectKey=ABovsh_eveus
sonar.host.url=https://sonarcloud.io

# Free plan analyzes only the main branch. Pin every scan to main so a
# release-branch run refreshes the main project entry instead of attempting
# (paid) branch analysis.
sonar.branch.name=main

sonar.sources=custom_components/eveus
sonar.tests=tests
sonar.python.version=3.12
sonar.python.coverage.reportPaths=coverage.xml

# Rules that are false positives in pytest code:
#   S1244 — float equality assertions
#   S6466 — list/index access in assertions
#   S7503 — async test functions / fixtures with no await
#
# Production-source rules that are intentional, not defects:
#   e4 S7503 — Home Assistant requires platform/entry hooks (async_setup_entry,
#              async_get_config_entry_diagnostics, repair flows, etc.) to be
#              `async def` even when the body never awaits. Removing `async`
#              breaks the HA contract.
#   e5 S3776 — cognitive complexity on HA lifecycle / config-flow / command /
#              network / parsing functions. Refactoring these is high-risk and
#              low-reward (well covered already); deliberately not split.
#   e6 S6792 / e7 S6796 — PEP 695 generic-syntax modernization. The package
#              standardizes on explicit typing.TypeVar/Generic (PEP 484) across
#              every module (common_base, control_base, utils) for one
#              consistent style; not adopted per-file.
sonar.issue.ignore.multicriteria=e1,e2,e3,e4,e5,e6,e7,e8
sonar.issue.ignore.multicriteria.e1.ruleKey=python:S1244
sonar.issue.ignore.multicriteria.e1.resourceKey=tests/**
sonar.issue.ignore.multicriteria.e2.ruleKey=python:S6466
sonar.issue.ignore.multicriteria.e2.resourceKey=tests/**
sonar.issue.ignore.multicriteria.e3.ruleKey=python:S7503
sonar.issue.ignore.multicriteria.e3.resourceKey=tests/**
sonar.issue.ignore.multicriteria.e4.ruleKey=python:S7503
sonar.issue.ignore.multicriteria.e4.resourceKey=custom_components/eveus/**
sonar.issue.ignore.multicriteria.e5.ruleKey=python:S3776
sonar.issue.ignore.multicriteria.e5.resourceKey=custom_components/eveus/**
sonar.issue.ignore.multicriteria.e6.ruleKey=python:S6792
sonar.issue.ignore.multicriteria.e6.resourceKey=custom_components/eveus/**
sonar.issue.ignore.multicriteria.e7.ruleKey=python:S6796
sonar.issue.ignore.multicriteria.e7.resourceKey=custom_components/eveus/**
# S1172 (unused parameter): HA platform contracts (device_trigger, config entry hooks)
# mandate fixed signatures like async_get_triggers(hass, device_id); the param cannot be dropped.
sonar.issue.ignore.multicriteria.e8.ruleKey=python:S1172
sonar.issue.ignore.multicriteria.e8.resourceKey=custom_components/eveus/**
