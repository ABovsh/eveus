name: Mutation Tests

# Weekly proof that the test suite catches real bugs (not just runs lines) in
# the layers users actually report issues against. Every user-facing failure so
# far has been in the config flow (issues #4, #5, #8, and the old-firmware
# setup reports), so config_flow.py + repairs.py are first-class targets next
# to the pure logic layer this workflow originally covered. safety.py (ground
# fault / leak / overheat threshold and fault-recovery logic) was added
# 2026-07-23 as the highest-stakes previously-untested layer -- its name says
# what's at risk if a boundary or and/or mutation there ever went unnoticed.
# entity-base (common_base.py + control_base.py) was added the same day: the
# shared availability grace-period state machine and optimistic-control
# reconcile/expire lifecycle used by every switch/number entity -- the
# highest blast-radius-per-line gap in the repo (control_base.py had 100%
# line coverage and zero mutation exposure before this).
#
# One matrix leg per target group, and each leg gets its own full time budget —
# the 2026-06-30 single-job run died at a 45-minute cap before reporting
# anything. Killer test lists are curated per target and kept honest by the
# contracts in tests/test_ci_workflow.py (a renamed target or test file fails
# fast in Validate instead of silently weakening the cron job).
#
# Report-only gate: every target file uses `from __future__ import
# annotations` (PEP 563), so mutmut's type-annotation mutations are inert at
# runtime — no test can ever kill them. Literal zero survivors is therefore
# structurally unreachable, so a leg is NOT failed just because mutmut's exit
# code says some mutants survived or timed out (`continue-on-error` on the
# run step below). The job only fails for real when mutmut itself doesn't
# produce a usable report (crash, bad install, bad --paths-to-mutate) — see
# the sanity check in "Report results". The survivor/timeout report is still
# published in full on every run; that's this workflow's actual product.

on:
  workflow_dispatch:
  schedule:
    - cron: "0 5 * * 2"

permissions:
  contents: read

concurrency:
  group: mutation-tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  mutate:
    name: Mutate ${{ matrix.name }}
    runs-on: ubuntu-latest
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: config-flow
            paths: "custom_components/eveus/config_flow.py,custom_components/eveus/repairs.py"
            tests: >-
              tests/test_config_flow.py
              tests/test_config_flow_phase_string.py
              tests/test_config_flow_schema_serializable.py
              tests/test_config_flow_host_properties.py
              tests/test_translation_contract.py
              tests/test_repairs.py
              tests/test_issue_regressions.py
              tests/test_hardening_4_16_1.py
              tests/test_hardening_rc_2026_07_01.py
          - name: payload-utils
            paths: "custom_components/eveus/utils.py,custom_components/eveus/_payload.py"
            tests: >-
              tests/test_utils.py
              tests/test_property_invariants.py
              tests/test_firmware_parsing.py
              tests/test_real_payload_schema.py
              tests/test_multi_state_payload.py
              tests/test_normalize_soc_input.py
          - name: coordinator
            paths: "custom_components/eveus/common_network.py"
            tests: >-
              tests/test_common_network.py
              tests/test_command.py
              tests/test_availability_clock.py
              tests/test_property_invariants.py
          - name: soc-limit
            paths: "custom_components/eveus/soc_limit.py"
            tests: >-
              tests/test_soc_limit.py
              tests/test_soc_limit_switch.py
              tests/test_hardening_rc_2026_07_01.py
              tests/test_hardening_4_16_1.py
          - name: safety
            paths: "custom_components/eveus/safety.py"
            tests: >-
              tests/test_safety.py
              tests/test_safety_unknown_error.py
          - name: entity-base
            paths: "custom_components/eveus/common_base.py,custom_components/eveus/control_base.py"
            tests: >-
              tests/test_availability_clock.py
              tests/test_grace_recheck_recovery.py
              tests/test_control_entities.py
              tests/test_control_select_coverage.py
              tests/test_entities.py
              tests/test_sensor_definition_entities.py
              tests/test_time_controls.py
              tests/test_firmware_parsing.py
              tests/test_hardening_4_16_1.py
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          # mutmut 2.x crashes on newer Pythons (itertools.count pickling);
          # 3.12 is the supported-floor interpreter Validate already tests.
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install -r requirements_test.txt
          # 3.x dropped --paths-to-mutate and broke the 2026-06-23 run; stay on 2.x.
          python -m pip install "mutmut<3.0"

      - name: Run mutation tests
        env:
          PYTHONFAULTHANDLER: "1"
        # continue-on-error: mutmut's exit code encodes survived/timeout
        # counts, not crashes — see the report-only-gate note above. A real
        # crash is caught below instead, in "Report results".
        continue-on-error: true
        # -x: kill a mutant on its first failing test instead of finishing the
        # whole killer suite — the dominant cost is (mutant count x runner time).
        run: >-
          python -m mutmut run
          --paths-to-mutate "${{ matrix.paths }}"
          --tests-dir tests
          --runner "python -m pytest -x -q ${{ matrix.tests }}"
          --simple-output
          --no-progress

      - name: Report results
        # Survivor diffs are this workflow's entire product; publish them to the
        # run summary AND to stdout whether the run step passed, failed, or
        # timed out. The summary pane is not retrievable through the REST API,
        # so the job log (which is) must carry the same information. This step
        # also owns the job's actual pass/fail signal now (see the report-only
        # gate note at the top of the file): it fails the job only when mutmut
        # produced no usable report at all, not when it found survivors.
        if: always()
        run: |
          python -m mutmut results 2>&1 | tee mutmut-results.txt || true
          {
            echo "## Mutation results — ${{ matrix.name }}"
            echo '```'
            cat mutmut-results.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
          ids=$(python -m mutmut result-ids survived 2>/dev/null || true)
          if [ -n "$ids" ]; then
            for id in $(echo "$ids" | tr ' ' '\n' | head -500); do
              python -m mutmut show "$id" 2>&1 || true
            done | tee mutmut-survivors.txt
            {
              echo "<details><summary>Surviving mutant diffs</summary>"
              echo ""
              echo '```diff'
              cat mutmut-survivors.txt
              echo '```'
              echo "</details>"
            } >> "$GITHUB_STEP_SUMMARY"
          fi
          # Real failure signal: an empty results file, or one containing a
          # Python traceback / argparse usage error, means mutmut crashed or
          # never ran at all (bad install, bad --paths-to-mutate) rather than
          # just finding survivors — that's the one case this workflow still
          # needs to fail loudly on. `mutmut results` only lists categories
          # worth attention (Survived/Timed out/Suspicious — not every run has
          # any of those, and a fully-killed leg prints none of them), so this
          # checks for crash signatures rather than requiring specific text.
          if [ ! -s mutmut-results.txt ] || grep -qE 'Traceback \(most recent call last\)|^usage: mutmut' mutmut-results.txt; then
            echo "::error::mutmut produced no usable report for ${{ matrix.name }} — treating as a real CI failure, not a survivor count."
            exit 1
          fi

      - name: Check survivor baseline (regression ratchet)
        # The report-only gate above never fails on survivor count (by
        # design — see the note at the top of this file). That means an
        # increase in real survivors from newly-shipped, untested code
        # looked identical to expected noise. This step diffs against a
        # committed baseline: an increase is a loud ::warning::, a decrease
        # is a prompt to tighten .github/mutation-baseline.json.
        if: always()
        env:
          LEG_NAME: ${{ matrix.name }}
        run: |
          survived=$(python -m mutmut result-ids survived 2>/dev/null | tr ' ' '\n' | grep -c . || true)
          baseline=$(python3 -c "import json,os; print(json.load(open('.github/mutation-baseline.json')).get(os.environ['LEG_NAME'], 0))")
          echo "Leg $LEG_NAME: survivors=$survived baseline=$baseline"
          if [ "$survived" -gt "$baseline" ]; then
            echo "::warning::$LEG_NAME: survivors increased ($baseline -> $survived) — likely new code shipped without a killer test."
          elif [ "$survived" -lt "$baseline" ]; then
            echo "::notice::$LEG_NAME: survivors decreased ($baseline -> $survived) — update .github/mutation-baseline.json to tighten the ratchet."
          fi
