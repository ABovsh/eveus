name: Validate

# No schedule: the suite runs on every push/PR — the only time the code can
# change. Upstream-drift checks (hassfest/HACS requirements) can be run on
# demand via workflow_dispatch instead of burning a daily run.
on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: validate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Unit tests
    runs-on: "ubuntu-latest"
    steps:
      - uses: "actions/checkout@v4"

      - name: Set up Python
        uses: "actions/setup-python@v5"
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install test dependencies
        run: "python -m pip install -r requirements_test.txt"

      - name: Validate JSON files
        run: |
          python -m json.tool custom_components/eveus/manifest.json >/dev/null
          python -m json.tool custom_components/eveus/strings.json >/dev/null
          python -m json.tool custom_components/eveus/translations/en.json >/dev/null
          python -m json.tool hacs.json >/dev/null

      - name: Compile integration
        run: "python -m compileall custom_components/eveus"

      - name: Lint
        run: "python -m ruff check custom_components/eveus tests"

      - name: Run tests
        run: "python -m pytest -q --cov --cov-report=xml --cov-fail-under=90"

      - name: Upload coverage report
        if: github.event_name == 'push'
        uses: "actions/upload-artifact@v4"
        with:
          name: coverage-xml
          path: coverage.xml
          retention-days: 1

  sonar:
    name: SonarCloud
    needs: test
    if: github.event_name == 'push'
    runs-on: "ubuntu-latest"
    steps:
      - uses: "actions/checkout@v4"
        with:
          # Full history so SonarCloud can attribute new code and blame lines.
          fetch-depth: 0

      - name: Download coverage report
        uses: "actions/download-artifact@v4"
        with:
          name: coverage-xml

      - name: SonarCloud scan
        uses: "SonarSource/sonarqube-scan-action@v6"
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: "https://sonarcloud.io"

  validate-hacs:
    name: HACS
    runs-on: "ubuntu-latest"
    steps:
      - uses: "actions/checkout@v4"
      - name: HACS validation
        uses: "hacs/action@main"
        with:
          category: "integration"

  validate-hassfest:
    name: Hassfest
    runs-on: "ubuntu-latest"
    steps:
      - uses: "actions/checkout@v4"
      - uses: home-assistant/actions/hassfest@master
