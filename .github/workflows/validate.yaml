name: Validate

# Runs on every push/PR (when the code changes) plus a weekly drift canary:
# the config flow broke for users not from a code change but from a newer Home
# Assistant tightening schema serialization. The Monday run reinstalls the
# latest HA + deps against the shipped code on the default branch, so a
# dependency-driven break surfaces in CI before a user reports it.
on:
  push:
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * 1"

permissions:
  contents: read

concurrency:
  group: validate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Unit tests (py${{ matrix.python-version }}, HA ${{ matrix.ha-label }})
    runs-on: "ubuntu-latest"
    strategy:
      fail-fast: false
      matrix:
        include:
          # Floor: minimum supported HA on the minimum supported Python. Guards
          # against accidentally relying on a newer-HA-only API.
          - python-version: "3.12"
            ha-pin: "homeassistant==2025.1.0"
            ha-label: "min"
          # Ceiling: latest HA + deps on a current Python. This is the leg that
          # would have caught issue #8 — a stricter voluptuous_serialize that
          # rejected the old config-flow schema.
          - python-version: "3.14.2"
            ha-pin: ""
            ha-label: "latest"
    steps:
      - uses: "actions/checkout@v4"

      - name: Set up Python
        uses: "actions/setup-python@v5"
        with:
          python-version: "${{ matrix.python-version }}"
          cache: "pip"

      - name: Install test dependencies
        run: |
          python -m pip install -r requirements_test.txt
          # Pin to the supported floor on that leg; the unpinned leg keeps the
          # latest HA that requirements_test resolves.
          if [ -n "${{ matrix.ha-pin }}" ]; then
            python -m pip install "${{ matrix.ha-pin }}"
          fi
          python -c "from homeassistant.const import __version__; print('HA', __version__)"

      - name: Validate JSON files
        run: |
          python -m json.tool custom_components/eveus/manifest.json >/dev/null
          python -m json.tool custom_components/eveus/strings.json >/dev/null
          python -m json.tool custom_components/eveus/translations/en.json >/dev/null
          python -m json.tool hacs.json >/dev/null

      - name: Compile integration
        run: "python -m compileall custom_components/eveus"

      - name: Lint
        run: "python -m ruff check custom_components/eveus tests"

      - name: Run tests
        run: "python -m pytest -q --cov --cov-report=xml --cov-fail-under=90"

      - name: Upload coverage report
        # One leg only: the floor leg feeds SonarCloud, so two matrix legs can't
        # race to upload the same artifact name.
        if: github.event_name == 'push' && matrix.ha-label == 'min'
        uses: "actions/upload-artifact@v4"
        with:
          name: coverage-xml
          path: coverage.xml
          retention-days: 1

  sonar:
    name: SonarCloud
    needs: test
    if: github.event_name == 'push'
    runs-on: "ubuntu-latest"
    steps:
      - uses: "actions/checkout@v4"
        with:
          # Full history so SonarCloud can attribute new code and blame lines.
          fetch-depth: 0

      - name: Download coverage report
        uses: "actions/download-artifact@v4"
        with:
          name: coverage-xml

      - name: SonarCloud scan
        uses: "SonarSource/sonarqube-scan-action@v6"
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: "https://sonarcloud.io"

  validate-hacs:
    name: HACS
    runs-on: "ubuntu-latest"
    steps:
      - uses: "actions/checkout@v4"
      - name: HACS validation
        uses: "hacs/action@main"
        with:
          category: "integration"

  validate-hassfest:
    name: Hassfest
    runs-on: "ubuntu-latest"
    steps:
      - uses: "actions/checkout@v4"
      - uses: home-assistant/actions/hassfest@master
