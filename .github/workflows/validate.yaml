name: Validate

on:
  push:
  pull_request:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Unit tests
    runs-on: "ubuntu-latest"
    steps:
      - uses: "actions/checkout@v4"

      - name: Set up Python
        uses: "actions/setup-python@v5"
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install test dependencies
        run: "python -m pip install -r requirements_test.txt"

      - name: Validate JSON files
        run: |
          python -m json.tool custom_components/eveus/manifest.json >/dev/null
          python -m json.tool custom_components/eveus/strings.json >/dev/null
          python -m json.tool custom_components/eveus/translations/en.json >/dev/null
          python -m json.tool hacs.json >/dev/null

      - name: Compile integration
        run: "python -m compileall custom_components/eveus"

      - name: Lint
        run: "python -m ruff check custom_components/eveus tests"

      - name: Run tests
        run: "python -m pytest -q --cov --cov-fail-under=90"

  validate-hacs:
    name: HACS
    runs-on: "ubuntu-latest"
    steps:
      - uses: "actions/checkout@v4"
      - name: HACS validation
        uses: "hacs/action@main"
        with:
          category: "integration"

  validate-hassfest:
    name: Hassfest
    runs-on: "ubuntu-latest"
    steps:
      - uses: "actions/checkout@v4"
      - uses: home-assistant/actions/hassfest@master
