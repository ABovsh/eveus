# Static analysis of the workflow files themselves (template injection,
# credential persistence, unpinned actions, excessive permissions).
# Findings are uploaded as SARIF to the Security tab rather than failing CI.
name: Workflow security (zizmor)

on:
  push:
    branches: [main]
    paths: [".github/workflows/**", ".github/dependabot.yml"]
  pull_request:
    paths: [".github/workflows/**", ".github/dependabot.yml"]

permissions:
  contents: read

jobs:
  zizmor:
    name: zizmor
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read
    steps:
      - uses: "actions/checkout@v6"
        with:
          persist-credentials: false
      - uses: "zizmorcore/zizmor-action@192e21d79ab29983730a13d1382995c2307fbcaa" # v0.5.7
